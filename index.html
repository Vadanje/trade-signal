<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0d0d">
<link rel="manifest" href="manifest.json">
<title>Trade Signal</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="flash-overlay" id="flashOverlay"></div>

<h1>Trade Signal</h1>

<!-- Alert Banner -->
<div id="alertBanner" class="alert-banner hidden"></div>

<!-- Open Positions Tracker -->
<div id="positionTracker" class="position-tracker hidden"></div>

<!-- Mode Toggle -->
<div id="modeSection" class="mode-toggle">
  <button id="modeLimit" class="mode-btn mode-active" onclick="setMode('limit')">LIMIT</button>
  <button id="modeMarket" class="mode-btn" onclick="setMode('market')">MARKET</button>
</div>

<!-- Input Section -->
<div id="inputSection" class="input-section">
  <div class="direction-toggle">
    <button id="btnBuy" onclick="setDirection('buy')">BUY</button>
    <button id="btnSell" onclick="setDirection('sell')">SELL</button>
  </div>

  <!-- Limit mode: entry price -->
  <div id="limitFields">
    <label>Entry Price</label>
    <input type="number" id="entry" step="0.00001" placeholder="e.g. 1.26450" inputmode="decimal">
  </div>

  <!-- Market mode: current price -->
  <div id="marketFields" class="hidden">
    <label>Current Market Price</label>
    <input type="number" id="marketEntry" step="0.00001" placeholder="Price you see now" inputmode="decimal">
  </div>

  <label>Stop Loss Price</label>
  <input type="number" id="sl" step="0.00001" placeholder="e.g. 1.26200" inputmode="decimal">

  <div id="tpField" class="hidden">
    <label>Take Profit Price</label>
    <input type="number" id="tp" step="0.00001" placeholder="e.g. 1.26900" inputmode="decimal">
  </div>

  <div class="error-msg" id="errorMsg"></div>
  <button class="btn btn-primary" onclick="calculate()">Calculate</button>
</div>

<div id="confirmScreen" class="hidden"></div>
<div id="signalSummary" class="hidden"></div>
<div id="stepCounter" class="step-counter hidden"></div>
<div id="progressSection" class="hidden">
  <div class="progress-bar" id="progressBar"></div>
</div>
<div id="results" class="hidden"></div>
<div id="shareSection" class="hidden">
  <button class="btn btn-share" onclick="shareSignal()">📤 Share Signal Link</button>
  <button class="btn btn-position" onclick="markPositionOpen()">📍 Mark Position Open</button>
  <button class="reset-btn" onclick="confirmReset()">New Signal</button>
</div>
<div id="modalOverlay" class="hidden"></div>

<!-- News Events -->
<div id="newsSection" class="news-section">
  <h3 onclick="toggleNews()">📅 High Impact News <span id="newsToggle">▼</span></h3>
  <div id="newsContent" class="news-content hidden"></div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
<script src="position.js"></script>
<script src="utils.js"></script>
</body>
</html>
